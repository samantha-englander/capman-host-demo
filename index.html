<!DOCTYPE html>
<html>
<head>
  <base href="/capman-host-demo/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Toast Tables Demo">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Toast Tables">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Tables</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #1a1c1f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      color: #ffffff;
      opacity: 1;
      transition: opacity 0.4s ease;
      text-align: center;
      padding: 24px;
    }

    #loading.fade-out { opacity: 0; }

    /* ── Logo lockup ── */
    #logo-lockup {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    #toast-icon {
      width: 56px;
      height: 56px;
      opacity: 0.92;
    }

    #loading-logo {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #ffffff;
    }

    #loading-logo span {
      color: #e8d5a3;
    }

    /* ── Progressive fill dots ── */
    .dot-track {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .fdot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
    }

    /* ── Pun ── */
    #pun {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.1px;
      min-height: 20px;
      transition: opacity 0.5s ease;
    }

    #pun.hidden { opacity: 0; }
  </style>
</head>
<body>
  <div id="loading">

    <div id="logo-lockup">
      <!-- Toast slice icon -->
      <svg id="toast-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- toast slice body -->
        <rect x="10" y="14" width="36" height="32" rx="5" fill="#e8d5a3" opacity="0.9"/>
        <!-- crust bottom -->
        <rect x="10" y="38" width="36" height="8" rx="3" fill="#c8a96e" opacity="0.9"/>
        <!-- heat waves -->
        <path d="M20 8 Q22 5 24 8 Q26 11 28 8" stroke="#e8d5a3" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.55"/>
        <path d="M28 8 Q30 5 32 8 Q34 11 36 8" stroke="#e8d5a3" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.55"/>
      </svg>

      <div id="loading-logo">Toast <span>Tables</span></div>
    </div>

    <div class="dot-track" id="dot-track">
      <!-- 10 dots, filled by JS -->
      <div class="fdot" id="d0"></div>
      <div class="fdot" id="d1"></div>
      <div class="fdot" id="d2"></div>
      <div class="fdot" id="d3"></div>
      <div class="fdot" id="d4"></div>
      <div class="fdot" id="d5"></div>
      <div class="fdot" id="d6"></div>
      <div class="fdot" id="d7"></div>
      <div class="fdot" id="d8"></div>
      <div class="fdot" id="d9"></div>
    </div>

    <div id="pun">Seating your experience...</div>
  </div>

  <script>
    // ── Progressive fill dots ──────────────────────────────────────────────────
    var dots = Array.from({length: 10}, function(_, i) { return document.getElementById('d' + i); });
    var filledColor = '#e8d5a3';
    var emptyColor  = 'rgba(255,255,255,0.15)';
    var dotIndex = 0;
    var forward = true;

    function stepDots() {
      if (forward) {
        if (dotIndex < dots.length) {
          dots[dotIndex].style.background = filledColor;
          dots[dotIndex].style.transition = 'background 0.18s ease';
          dotIndex++;
        } else {
          forward = false;
          setTimeout(function() {
            dots.forEach(function(d) { d.style.background = emptyColor; });
            dotIndex = 0;
            forward = true;
          }, 500);
        }
      }
    }

    setInterval(stepDots, 160);

    // ── Pun rotation ──────────────────────────────────────────────────────────
    var puns = [
      "Seating your experience...",
      "Adding you to the waitlist… just kidding.",
      "Clearing the corner table for you...",
      "Polishing the silverware...",
      "Your table will be ready shortly...",
      "Briefing the host staff...",
      "Checking the reservation book...",
      "Preparing tonight’s floor plan...",
      "Teaching the waitlist to wait patiently...",
      "No walk-ins, we promise you’re expected.",
    ];

    var punEl = document.getElementById('pun');
    var currentPun = 0;

    function rotatePun() {
      punEl.classList.add('hidden');
      setTimeout(function () {
        currentPun = (currentPun + 1) % puns.length;
        punEl.textContent = puns[currentPun];
        punEl.classList.remove('hidden');
      }, 500);
    }

    setInterval(rotatePun, 4500);

    // ── Hide on first Flutter frame ───────────────────────────────────────────
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) {
        el.classList.add('fade-out');
        setTimeout(function () { el.remove(); }, 450);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
