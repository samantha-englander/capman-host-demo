<!DOCTYPE html>
<html>
<head>
  <base href="/capman-host-demo/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Toast Tables Demo">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Toast Tables">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Tables</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #1a1c1f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      color: #ffffff;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    #loading.fade-out {
      opacity: 0;
    }

    #loading-logo {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #ffffff;
    }

    #loading-sub {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.2px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(78, 205, 196, 0.25);
      border-top-color: #4ecdc4;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div id="loading-logo">Toast Tables</div>
    <div class="spinner"></div>
    <div id="loading-sub">Loading demo, hang tight...</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) {
        el.classList.add('fade-out');
        setTimeout(function () { el.remove(); }, 450);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
