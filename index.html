<!DOCTYPE html>
<html>
<head>
  <base href="/capman-host-demo/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Toast Tables Demo">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Toast Tables">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Tables</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111315;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* ── Tablet frame ────────────────────────────────────────────────────── */
    /*
     * iPad Pro 12.9" landscape  →  1366 × 1024 logical px  (ratio ≈ 1.334)
     *
     * Width = min(96vw, 94vh × ratio)  — whichever fits the current window.
     * Height follows via aspect-ratio, so the frame always preserves the
     * iPad proportions and scales up on large screens.
     */
    .tablet-frame {
      width: min(96vw, calc(94vh * 1.3340));
      aspect-ratio: 1366 / 1024;
      background: #1c1c1e;
      border-radius: 22px;
      /* outer ring + depth shadow */
      box-shadow:
        0 0 0 1px #3d3d3f,
        0 0 0 3px #111315,
        0 32px 80px rgba(0, 0, 0, 0.85),
        0 6px 20px  rgba(0, 0, 0, 0.5);
      padding: 13px 13px 20px;
      position: relative;
      flex-shrink: 0;
    }

    /* inset bezel sheen — subtle highlight on the inner edge */
    .tablet-frame::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 22px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      pointer-events: none;
      z-index: 20;
    }

    /* front-facing camera — top-center (landscape orientation) */
    .tablet-camera {
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 7px;
      height: 7px;
      background: #2c2c2e;
      border: 1px solid #3a3a3c;
      border-radius: 50%;
      z-index: 21;
    }

    /* iPad Pro home indicator (no physical button) */
    .tablet-home {
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      z-index: 21;
    }

    /* ── Flutter render target ───────────────────────────────────────────── */
    /*
     * Flutter mounts here. Its layout engine reads this element's
     * dimensions, so the app thinks it is running on a ~1366×1024 surface.
     */
    #flutter-host {
      width: 100%;
      height: 100%;
      border-radius: 11px;
      overflow: hidden;
      position: relative;
      background: #16181c;
    }

    /* ── Loading splash ──────────────────────────────────────────────────── */
    #loading-card {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      background: #16181c;
      border-radius: 11px;
      opacity: 1;
      transition: opacity 0.35s ease;
      z-index: 50;
    }

    #loading-card.fade-out { opacity: 0; pointer-events: none; }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.4px;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(78, 205, 196, 0.2);
      border-top-color: #4ecdc4;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #pun {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.45);
      text-align: center;
      max-width: 240px;
      transition: opacity 0.4s ease;
    }

    #pun.hidden { opacity: 0; }

    /* Build sha + timestamp, fixed bottom-left of the viewport (outside
     * the tablet frame). Lets you confirm at a glance which deploy is
     * live — no need to inspect gh-pages. The placeholder gets sed-
     * replaced by build.sh; if you ever see "32e4e1a" you're
     * looking at unbuilt source. */
    #build-badge {
      position: fixed;
      bottom: 8px;
      left: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.3px;
      user-select: text;
      z-index: 100;
      pointer-events: auto;
    }
    #build-badge:hover { color: rgba(255, 255, 255, 0.75); }
  </style>
</head>
<body>

  <div class="tablet-frame">
    <div class="tablet-camera"></div>

    <div id="flutter-host">
      <div id="loading-card">
        <span class="logo-text">Toast Tables</span>
        <div class="spinner"></div>
        <div id="pun">Seating your experience...</div>
      </div>
    </div>

    <div class="tablet-home"></div>
  </div>

  <div id="build-badge">build 32e4e1a · 2026-05-29 17:40 UTC</div>

  <script>
    // Unregister any service workers from prior deploys. Flutter previously
    // registered flutter_service_worker.js, which can outlive hard-reloads
    // and cookie clears — it intercepts requests at the network layer and
    // can serve a stale flutter_bootstrap.js (the file responsible for
    // mounting Flutter into the tablet frame). Killing all SWs on every
    // load guarantees the user is always running the freshest code.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
      // Also nuke any caches the old SW may have populated.
      if (window.caches && caches.keys) {
        caches.keys().then(function(keys) {
          keys.forEach(function(k) { caches.delete(k); });
        });
      }
    }
  </script>
  <script>
    // Silently swallow Sentry telemetry calls. Sentry uses raw fetch so it
    // bypasses the Dart-side Dio interceptor; the 429s clutter DevTools and
    // (worse) hit Sentry's servers from customer machines during demos.
    (function() {
      var origFetch = window.fetch;
      window.fetch = function(input, init) {
        var url = (typeof input === 'string') ? input : (input && input.url) || '';
        if (url.indexOf('sentry.io') !== -1) {
          return Promise.resolve(new Response('', { status: 200 }));
        }
        return origFetch.apply(this, arguments);
      };
    })();
  </script>
  <script>
    var puns = [
      "Seating your experience...",
      "Adding you to the waitlist… just kidding.",
      "Clearing the corner table for you...",
      "Polishing the silverware...",
      "Your table will be ready shortly...",
      "Briefing the host staff...",
      "Checking the reservation book...",
      "Preparing tonight's floor plan...",
      "Teaching the waitlist to wait patiently...",
      "No walk-ins, we promise you're expected.",
    ];

    var punEl = document.getElementById('pun');
    var currentPun = 0;

    function rotatePun() {
      punEl.classList.add('hidden');
      setTimeout(function() {
        currentPun = (currentPun + 1) % puns.length;
        punEl.textContent = puns[currentPun];
        punEl.classList.remove('hidden');
      }, 400);
    }

    setInterval(rotatePun, 4500);

    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading-card');
      if (el) {
        el.classList.add('fade-out');
        setTimeout(function() { el.remove(); }, 400);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>

</body>
</html>
