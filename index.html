<!DOCTYPE html>
<html>
<head>
  <base href="/capman-host-demo/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Toast Tables Demo">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Toast Tables">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Tables</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0d0f11;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    /* ── Card (matches the Flutter login card) ── */
    #loading-card {
      background: rgba(22, 24, 28, 0.97);
      border-radius: 20px;
      padding: 52px 44px 48px;
      width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      opacity: 1;
      transition: opacity 0.35s ease;
    }

    #loading-card.fade-out { opacity: 0; }

    /* ── Logo row ── */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.3px;
    }

    /* ── Subtitle ── */
    .logo-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 44px;
      max-width: 260px;
    }

    /* ── Teal spinner ── */
    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid rgba(78, 205, 196, 0.2);
      border-top-color: #4ecdc4;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin-bottom: 24px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Phrase ── */
    #pun {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.45);
      text-align: center;
      min-height: 18px;
      transition: opacity 0.4s ease;
      letter-spacing: 0.05px;
    }

    #pun.hidden { opacity: 0; }
  </style>
</head>
<body>
  <div id="loading-card">

    <!-- Logo (mirrors the Flutter login screen header) -->
    <div class="logo-row">
      <!-- Circle host icon — approximates the app icon -->
      <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="17" stroke="white" stroke-width="1.8"/>
        <circle cx="18" cy="13" r="4.5" fill="white"/>
        <path d="M7 30 Q7 22 18 22 Q29 22 29 30" fill="white"/>
      </svg>
      <span class="logo-text">Toast Tables</span>
    </div>

    <div class="logo-subtitle">Waitlist, Reservation, and Capacity Management by Toast</div>

    <div class="spinner"></div>

    <div id="pun">Seating your experience...</div>
  </div>

  <script>
    // ── Pun rotation ──────────────────────────────────────────────────────────
    var puns = [
      "Seating your experience...",
      "Adding you to the waitlist… just kidding.",
      "Clearing the corner table for you...",
      "Polishing the silverware...",
      "Your table will be ready shortly...",
      "Briefing the host staff...",
      "Checking the reservation book...",
      "Preparing tonight's floor plan...",
      "Teaching the waitlist to wait patiently...",
      "No walk-ins, we promise you're expected.",
    ];

    var punEl = document.getElementById('pun');
    var currentPun = 0;

    function rotatePun() {
      punEl.classList.add('hidden');
      setTimeout(function () {
        currentPun = (currentPun + 1) % puns.length;
        punEl.textContent = puns[currentPun];
        punEl.classList.remove('hidden');
      }, 400);
    }

    setInterval(rotatePun, 4500);

    // ── Hide on first Flutter frame ───────────────────────────────────────────
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading-card');
      if (el) {
        el.classList.add('fade-out');
        setTimeout(function () { el.remove(); }, 400);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
